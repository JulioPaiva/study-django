{% load static %}

<section id="hero" class="hero section dark-background">
    <div class="container">
        <div class="row gy-4">
            <div class="col-lg-6 order-2 order-lg-1 d-flex flex-column justify-content-center" data-aos="zoom-out">
                <h1>Seja Bem-Vindo(a)!</h1>
                {% if profile %}
                    <p><b> {{profile.name}}</b> - {{profile.bio}}</p>
                {% else %}
                    <p><b> Júlio Paiva</b> - Backend Developer</p>
                {% endif %}
                <div class="d-flex">
                <a href="{{profile.github}}" class="btn-get-started">GitHub</a>
                <a href="https://www.youtube.com/watch?v=_WkvWLbKh9M" class="glightbox btn-watch-video d-flex align-items-center"><i class="bi bi-play-circle"></i><span>Assita ao Vídeo</span></a>
                </div>
            </div>
            <div class="col-lg-6 order-1 order-lg-2 hero-img" data-aos="zoom-out" data-aos-delay="200">
                <img src="{% static 'img/hero-img.png' %}" class="img-fluid animated" alt="">
            </div>
        </div>
    </div>
</section>

<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
                <strong>{{ message }}</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
</div>
