{% load static %}

<section id="contact" class="contact section">
    <div class="container section-title" data-aos="fade-up">
        <h2>Contato</h2>
        <p>Fale conosco</p>
    </div>

    <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="row gy-4">
            <div class="col-lg-5">
                <div class="info-wrap">
                    <div class="info-item d-flex" data-aos="fade-up" data-aos-delay="300">
                        <i class="bi bi-telephone flex-shrink-0"></i>
                        <div>
                            <h3>Ligue</h3>
                            {% for phone in profile.phones.all %}
                                <p>{{phone.number}}</p>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="info-item d-flex" data-aos="fade-up" data-aos-delay="400">
                        <i class="bi bi-envelope flex-shrink-0"></i>
                        <div>
                            <h3>Email</h3>
                            {% for email in profile.emails.all %}
                                <p>{{email.email}}</p>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <form action="{% url 'index' %}" method="post" class="php-email-form" data-aos="fade-up" data-aos-delay="200">
                    {% csrf_token %}
                    <div class="row gy-4">
                        <div class="col-md-6">
                            <label for="name-field" class="pb-2">Seu Name</label>
                            <input type="text" name="name" id="name-field" class="form-control" required="">
                        </div>
                        <div class="col-md-6">
                            <label for="email-field" class="pb-2">Seu Email</label>
                            <input type="email" class="form-control" name="email" id="email-field" required="">
                        </div>
                        <div class="col-md-12">
                            <label for="subject-field" class="pb-2">Assunto</label>
                            <input type="text" class="form-control" name="subject" id="subject-field" required="">
                        </div>
                        <div class="col-md-12">
                            <label for="message-field" class="pb-2">Mensagem</label>
                            <textarea class="form-control" name="message" rows="10" id="message-field" required=""></textarea>
                        </div>
                        <div class="col-md-12 text-center">
                            <button name="contact_form" type="submit">Enviar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
