{% load static %}
<section id="skills" class="skills section">
    <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="row">
            <div class="col-lg-6 d-flex align-items-center">
                <img src="{% static 'img/illustration-10.webp' %}" class="img-fluid" alt="">
            </div>
            <div class="col-lg-6 pt-4 pt-lg-0 content">
                <h3>Minhas Habilidades</h3>
                <p class="fst-italic">
                Estas são minhas principais habilidades técnicas, desenvolvidas com prática constante, foco em qualidade, aprendizado contínuo e aplicação em projetos reais relevantes..
                </p>
                <div class="skills-content skills-animation">
                    <div class="progress">
                        <span class="skill"><span>HTML, CSS, JS</span> <i class="val">75%</i></span>
                        <div class="progress-bar-wrap">
                            <div class="progress-bar" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="progress">
                        <span class="skill"><span>Python / Django</span> <i class="val">71%</i></span>
                        <div class="progress-bar-wrap">
                            <div class="progress-bar" role="progressbar" aria-valuenow="71" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="progress">
                        <span class="skill"><span>SQL</span> <i class="val">68%</i></span>
                        <div class="progress-bar-wrap">
                            <div class="progress-bar" role="progressbar" aria-valuenow="68" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    <div class="progress">
                        <span class="skill"><span>Deploy / Infra</span> <i class="val">57%</i></span>
                        <div class="progress-bar-wrap">
                            <div class="progress-bar" role="progressbar" aria-valuenow="57" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
