{% load static %}
<section id="clients" class="clients section light-background">
    <div class="container" data-aos="zoom-in">
        <div class="swiper init-swiper">
            <script type="application/json" class="swiper-config">
                {
                "loop": true,
                "speed": 600,
                "autoplay": {
                    "delay": 5000
                },
                "slidesPerView": "auto",
                "pagination": {
                    "el": ".swiper-pagination",
                    "type": "bullets",
                    "clickable": true
                },
                "breakpoints": {
                    "320": {
                    "slidesPerView": 2,
                    "spaceBetween": 40
                    },
                    "480": {
                    "slidesPerView": 3,
                    "spaceBetween": 60
                    },
                    "640": {
                    "slidesPerView": 4,
                    "spaceBetween": 80
                    },
                    "992": {
                    "slidesPerView": 5,
                    "spaceBetween": 120
                    },
                    "1200": {
                    "slidesPerView": 6,
                    "spaceBetween": 120
                    }
                }
                }
          </script>
          <div class="swiper-wrapper align-items-center">
            {% for skill in profile.skills.all %}
                <div class="swiper-slide">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/{{ skill.image }}" />
                </div>
            {% endfor %}
            </div>
        </div>
    </div>
</section>
